<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>KONIGIN Home</title>
    <style>
      :root {
        --title: #e3d6ce;
        --text: rgba(227, 214, 206, 0.84);
        --muted: rgba(227, 214, 206, 0.64);
        --line: rgba(227, 214, 206, 0.18);
        --panel: rgba(14, 5, 8, 0.6);
        --panel-strong: rgba(22, 7, 11, 0.76);
        --button: rgba(69, 13, 20, 0.44);
        --shadow: rgba(0, 0, 0, 0.34);

        --safe-top: env(safe-area-inset-top, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);

        /* 内容最大宽度：控制文字与卡片阅读舒适度 */
        --content-max: 72rem;

        /* 背景舞台最大宽度：明显大于内容区，避免背景被压成中间细条 */
        --stage-max: 92rem;
      }

      @font-face {
        font-family: "Cinzel";
        src: url("/fonts/Cinzel-VariableFont_wght.ttf") format("truetype");
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Bilbo Swash Caps";
        src: url("/fonts/BilboSwashCaps-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Tangerine";
        src: url("/fonts/Tangerine-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        width: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        background: #120306;
      }

      body {
        width: 100%;
        margin: 0;
        overflow-x: hidden;
        color: var(--text);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
        background: #120306;
      }

      img,
      svg {
        display: block;
        max-width: 100%;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        position: relative;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* 背景图使用更宽的“舞台”，不再被压缩成中间细条 */
      .page::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: min(100%, var(--stage-max));
        min-height: 100%;
        background:
          linear-gradient(180deg, rgba(10, 3, 5, 0.34), rgba(5, 1, 3, 0.72)),
          url("../image/background/home.png") center top / 100% auto no-repeat;
        pointer-events: none;
        z-index: 0;
      }

      .page__inner {
        position: relative;
        z-index: 1;
        width: min(100%, var(--content-max));
        margin: 0 auto;
        padding:
          calc(1.25rem + var(--safe-top))
          max(1.1rem, calc(1.1rem + var(--safe-right)))
          calc(4rem + var(--safe-bottom))
          max(1.1rem, calc(1.1rem + var(--safe-left)));
      }

      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 100svh;
        padding: 0.8rem 0 4rem;
      }

      .header__logo {
        width: clamp(11rem, 22vw, 16rem);
        margin: 1.5 auto 2.25rem;
      }

      .header__welcome {
        margin: 0;
        color: var(--title);
        font-family: "Tangerine", "Times New Roman", serif;
        font-style: normal;
        font-size: clamp(3.1rem, 8vw, 6.2rem);
        font-weight: 700;
        line-height: 1.06;
      }

      .section {
        padding: 2.6rem 0 3rem;
      }

      .section + .section {
        margin-top: 1.4rem;
      }

      .section__head {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.7rem;
        margin-bottom: 1.5rem;
        text-align: center;
      }

      .section__icon-wrap {
        width: 3.6rem;
        height: 3.6rem;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--title);
      }

      .section__icon-wrap svg {
        width: 100%;
        height: 100%;
      }

      .section__title-row {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }

      .section__title-row::before,
      .section__title-row::after {
        content: "";
        flex: 1 1 auto;
        height: 1px;
        background: var(--line);
      }

      .section__title {
        margin: 0;
        color: var(--title);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .section__body {
        margin-top: 1.25rem;
      }

      .card {
        overflow: hidden;
        border: 1px solid rgba(227, 214, 206, 0.1);
        border-radius: 1.5rem;
        background:
          linear-gradient(180deg, rgba(53, 11, 18, 0.16), rgba(12, 4, 7, 0.72)),
          var(--panel);
        box-shadow: 0 1.35rem 3rem var(--shadow);
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-width: 10rem;
        padding: 0.85rem 1.5rem;
        border: 1px solid rgba(227, 214, 206, 0.16);
        border-radius: 999px;
        background: var(--button);
        color: var(--title);
        font-size: 0.98rem;
        letter-spacing: 0.03em;
      }

      .novel-card {
        position: relative;
        min-height: 24rem;
        isolation: isolate;
      }

      .novel-card__bg,
      .novel-card__overlay,
      .novel-card__content {
        position: absolute;
        inset: 0;
      }

      .novel-card__bg {
        z-index: 0;
      }

      .novel-card__bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
      }

      .novel-card__overlay {
        z-index: 1;
        background:
          linear-gradient(
            90deg,
            rgba(20, 5, 9, 0.94) 0%,
            rgba(33, 8, 13, 0.86) 22%,
            rgba(58, 12, 20, 0.6) 44%,
            rgba(33, 8, 13, 0.26) 66%,
            rgba(12, 4, 7, 0.16) 100%
          ),
          linear-gradient(180deg, rgba(14, 5, 8, 0.16), rgba(8, 2, 4, 0.38));
      }

      .novel-card__content {
        z-index: 2;
        width: min(44%, 24rem);
        padding: 2rem 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0.75rem;
      }

      .novel-card__title,
      .about-card__title {
        margin: 0;
        color: var(--title);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: clamp(2rem, 3.5vw, 3rem);
        font-weight: 500;
      }

      .novel-card__subtitle,
      .novel-card__meta,
      .novel-card__description,
      .gallery-card__text,
      .about-card__text {
        margin: 0;
        line-height: 1.8;
      }

      .novel-card__subtitle {
        font-size: clamp(1rem, 1.8vw, 1.3rem);
      }

      .novel-card__meta,
      .novel-card__description,
      .gallery-card__text,
      .about-card__text,
      .about-card__eyebrow {
        color: var(--muted);
      }

      .media-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.2rem;
        text-align: center;
        color: rgba(227, 214, 206, 0.4);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 1rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .media-placeholder img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .gallery-card {
        position: relative;
        min-height: 23rem;
        isolation: isolate;
      }

      .gallery-card__bg,
      .gallery-card__overlay,
      .gallery-card__content {
        position: absolute;
        inset: 0;
      }

      .gallery-card__bg {
        z-index: 0;
      }

      .gallery-card__bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
      }

      .gallery-card__overlay {
        z-index: 1;
        background:
          linear-gradient(
            90deg,
            rgba(18, 5, 8, 0.92) 0%,
            rgba(30, 8, 12, 0.82) 24%,
            rgba(62, 14, 22, 0.56) 46%,
            rgba(30, 8, 12, 0.24) 68%,
            rgba(10, 3, 5, 0.14) 100%
          ),
          linear-gradient(180deg, rgba(14, 5, 8, 0.1), rgba(8, 2, 4, 0.3));
      }

      .gallery-card__content {
        z-index: 2;
        width: min(42%, 22rem);
        padding: 1.75rem 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      .gallery-card__text {
        margin-bottom: 1rem;
        max-width: 28rem;
      }

      .about-card {
        padding: 2rem 1.5rem;
      }

      .about-card__eyebrow {
        margin: 0 0 0.65rem;
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 0.84rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .about-card__title {
        margin-bottom: 0.9rem;
      }

      .about-card__actions {
        margin-top: 1.15rem;
      }

      .about-card__nodes {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem 0.7rem;
      }

      .about-card__node {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.42rem 0.78rem;
        border: 1px solid rgba(227, 214, 206, 0.12);
        border-radius: 999px;
        background: rgba(54, 11, 17, 0.2);
        color: rgba(227, 214, 206, 0.78);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 0.76rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
        cursor: pointer;
      }

      button.about-card__node {
        appearance: none;
        -webkit-appearance: none;
      }

      .about-card__node.is-active {
        border-color: rgba(227, 214, 206, 0.26);
        background: rgba(84, 17, 27, 0.32);
        color: var(--title);
      }

      .about-card__detail {
        display: none;
        margin-top: 1rem;
        padding: 1rem 1rem 0.95rem;
        border: 1px solid rgba(227, 214, 206, 0.1);
        border-radius: 1rem;
        background:
          linear-gradient(180deg, rgba(52, 10, 17, 0.18), rgba(12, 4, 7, 0.56)),
          rgba(14, 5, 8, 0.42);
      }

      .about-card__detail.is-visible {
        display: block;
      }

      .about-card__detail-title {
        margin: 0 0 0.7rem;
        color: var(--title);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 1rem;
        letter-spacing: 0.05em;
      }

      .about-card__detail p {
        margin: 0.55rem 0 0;
        color: var(--muted);
        line-height: 1.8;
      }

      .about-detail__links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 0.6rem;
        margin-top: 1rem;
      }

      .about-detail__link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.34rem 0.68rem;
        border: 1px solid rgba(227, 214, 206, 0.12);
        border-radius: 999px;
        background: rgba(42, 9, 14, 0.28);
        color: rgba(227, 214, 206, 0.78);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 0.68rem;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        white-space: nowrap;
        transition:
          background-color 160ms ease,
          border-color 160ms ease,
          color 160ms ease;
      }

      .about-detail__link:hover {
        background: rgba(76, 15, 24, 0.34);
        border-color: rgba(227, 214, 206, 0.2);
        color: var(--title);
      }

      .footer-entry {
        display: flex;
        justify-content: center;
        padding: 1rem 0 0.5rem;
      }

      .footer-entry__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 12rem;
        padding: 0.8rem 1.4rem;
        border: 1px solid rgba(227, 214, 206, 0.14);
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(75, 14, 22, 0.34), rgba(24, 6, 10, 0.72)),
          rgba(18, 5, 8, 0.5);
        color: var(--title);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 0.86rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        box-shadow: 0 0.9rem 2rem rgba(0, 0, 0, 0.18);
      }

      @media (max-width: 900px) {
        .page__inner {
          width: min(100%, 58rem);
        }
      }

      @media (max-width: 680px) {
        .header {
          min-height: auto;
          padding-top: 0.4rem;
          padding-bottom: 2.6rem;
        }

        .section {
          padding: 2rem 0 2.5rem;
        }

        .section + .section {
          margin-top: 0.8rem;
        }

        .novel-card {
          min-height: 24rem;
        }

        .novel-card__content {
          width: min(72%, 18rem);
          padding: 1.5rem 1.25rem;
        }

        .gallery-card {
          min-height: 18rem;
        }

        .gallery-card__content {
          width: min(70%, 18rem);
          padding: 1.4rem 1.25rem;
        }
      }

      @media (max-width: 480px) {
        .page::before {
          width: 100%;
        }

        .page__inner {
          width: 100%;
          padding:
            calc(1rem + var(--safe-top))
            max(0.95rem, calc(0.95rem + var(--safe-right)))
            calc(2.5rem + var(--safe-bottom))
            max(0.95rem, calc(0.95rem + var(--safe-left)));
        }

        .section__title-row {
          gap: 0.7rem;
        }

        .section__icon-wrap {
          width: 3.2rem;
          height: 3.2rem;
        }

        .novel-card__content,
        .about-card,
        .gallery-card__content {
          padding: 1.25rem;
        }

        .novel-card__content {
          width: min(78%, 16rem);
        }

        .gallery-card__content {
          width: min(76%, 16rem);
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="page__inner">
        <header class="header">
          <img
            class="header__logo"
            src="../image/element/logo-home.png"
            alt="KONIGIN"
          />
          <h1 class="header__welcome">Welcome, Majesty</h1>
        </header>

        <section class="section" aria-labelledby="novels-title">
          <div class="section__head">
            <div class="section__icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                <g
                  fill="none"
                  stroke="#E3D6CE"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M16 36 C32 28,48 28,64 36 L64 96 C48 88,32 88,16 96 Z"
                  />
                  <path
                    d="M112 36 C96 28,80 28,64 36 L64 96 C80 88,96 88,112 96 Z"
                  />
                  <line x1="64" y1="36" x2="64" y2="96" />
                </g>
              </svg>
            </div>
            <div class="section__title-row">
              <h2 class="section__title" id="novels-title">Novels</h2>
            </div>
          </div>
          <div class="section__body" id="novels-container"></div>
        </section>

        <section class="section" aria-labelledby="gallery-title">
          <div class="section__head">
            <div class="section__icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                <g
                  fill="none"
                  stroke="#E3D6CE"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="20" y="40" width="88" height="56" rx="8" ry="8" />
                  <rect x="36" y="30" width="24" height="10" rx="2" />
                  <circle cx="64" cy="68" r="18" />
                  <circle cx="64" cy="68" r="8" />
                  <circle cx="94" cy="50" r="3" />
                </g>
              </svg>
            </div>
            <div class="section__title-row">
              <h2 class="section__title" id="gallery-title">Gallery</h2>
            </div>
          </div>
          <div class="section__body" id="gallery-container"></div>
        </section>

        <section class="section" aria-labelledby="about-title">
          <div class="section__head">
            <div class="section__icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                <g
                  fill="none"
                  stroke="#E3D6CE"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="64" cy="44" r="16" />
                  <path d="M34 96c8-16 22-24 30-24s22 8 30 24" />
                  <path d="M24 106h80" />
                </g>
              </svg>
            </div>
            <div class="section__title-row">
              <h2 class="section__title" id="about-title">About</h2>
            </div>
          </div>
          <div class="section__body" id="about-container"></div>
        </section>

        <div class="footer-entry">
          <a
            class="footer-entry__button"
            href="https://cn.konigindominion.com"
          >
            Chinese Site
          </a>
        </div>
      </div>
    </main>

    <script>
      const fallbackData = {
        novels: [
          {
            title: "Taming",
            subtitle: "Arachnid x You",
            meta: "18+ Mature Content",
            description: "A slow, dangerous and intimate descent into obsession.",
            cover: "",
            link: "/page/novels.html"
          }
        ],
        gallery: {
          title: "Curated Visions",
          description: "A dark visual archive of atmosphere, character and ritual beauty.",
          image: "",
          link: "#",
          cta: "View More"
        },
        about: {
          eyebrow: "Private Brand Journal",
          title: "KONIGIN",
          description:
            "KONIGIN is built as a dark red and black literary home: feminine, gothic, intimate, and restrained. The page reads like a vertical brand scroll rather than a commercial storefront, leaving space for novels, imagery and identity to unfold slowly.",
          links: [
            {
              label: "Disclaimer",
              href: "#",
              title: "Disclaimer",
              description: [
                "This site is presented as a personal creative archive and literary brand space.",
                "Themes may include dark romance, obsession, violence, erotic tension, and other mature fictional material intended for adult audiences."
              ]
            },
            {
              label: "Copyright",
              href: "#",
              title: "Copyright",
              description: [
                "Unless otherwise stated, all content on this site marked as original is the intellectual property of the site owner.",
                "Where applicable, underlying rights remain with their respective owners, while the original expression and transformative presentation on this site remain the property of the site owner."
              ]
            },
            {
              label: "Link Tree",
              href: "#",
              title: "Link Tree",
              description: [
                "External profile and archive links can be listed here once they are ready to publish."
              ]
            }
          ]
        }
      };

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>'"]/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "'": "&#39;",
          '"': "&quot;"
        }[char]));
      }

      function renderNovels(novels) {
        const item = Array.isArray(novels) && novels.length ? novels[0] : fallbackData.novels[0];

        return `
          <article class="card novel-card">
            <div class="novel-card__bg" aria-hidden="true">
              ${item.cover ? `<img src="${escapeHtml(item.cover)}" alt="">` : `<div class="media-placeholder">Novel Cover Placeholder</div>`}
            </div>
            <div class="novel-card__overlay" aria-hidden="true"></div>
            <div class="novel-card__content">
              <h3 class="novel-card__title">${escapeHtml(item.title)}</h3>
              <p class="novel-card__subtitle">${escapeHtml(item.subtitle)}</p>
              <p class="novel-card__meta">${escapeHtml(item.meta)}</p>
              <p class="novel-card__description">${escapeHtml(item.description)}</p>
              <a class="button" href="${escapeHtml(item.link || "#")}">Read More</a>
            </div>
          </article>
        `;
      }

      function renderGallery(gallery) {
        const item = gallery || fallbackData.gallery;

        return `
          <article class="card gallery-card">
            <div class="gallery-card__bg" aria-hidden="true">
              ${item.image ? `<img src="${escapeHtml(item.image)}" alt="">` : `<div class="media-placeholder">Gallery Image Placeholder</div>`}
            </div>
            <div class="gallery-card__overlay" aria-hidden="true"></div>
            <div class="gallery-card__content">
              <p class="gallery-card__text">${escapeHtml(item.description)}</p>
              <a class="button" href="${escapeHtml(item.link || "#")}">${escapeHtml(item.cta || "View More")}</a>
            </div>
          </article>
        `;
      }

      function renderAbout(about) {
        const item = about || fallbackData.about;
        const links = Array.isArray(item.links) && item.links.length
          ? item.links
          : fallbackData.about.links;
        const nodes = links.map((link, index) => {
          const hasDetail = Array.isArray(link.description) && link.description.length;
          const hasLinks = Array.isArray(link.links) && link.links.length;
          const detailId = `about-detail-${index}`;

          if (hasDetail || hasLinks) {
            return `
              <button
                class="about-card__node"
                type="button"
                data-detail-trigger="${detailId}"
                aria-expanded="false"
                aria-controls="${detailId}"
              >
                ${escapeHtml(link.label || "")}
              </button>
            `;
          }

          return `
            <a class="about-card__node" href="${escapeHtml(link.href || "#")}">
              ${escapeHtml(link.label || "")}
            </a>
          `;
        }).join("");
        const details = links.map((link, index) => {
          const hasDetail = Array.isArray(link.description) && link.description.length;
          const hasLinks = Array.isArray(link.links) && link.links.length;
          const detailId = `about-detail-${index}`;

          if (!hasDetail && !hasLinks) {
            return "";
          }

          const paragraphs = (Array.isArray(link.description) ? link.description : []).map((text) => `
            <p>${escapeHtml(text)}</p>
          `).join("");
          const detailLinks = hasLinks ? `
            <div class="about-detail__links">
              ${link.links.map((item) => `
                <a
                  class="about-detail__link"
                  href="${escapeHtml(item.href || "#")}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  ${escapeHtml(item.label || "")}
                </a>
              `).join("")}
            </div>
          ` : "";

          return `
            <div class="about-card__detail" id="${detailId}" hidden>
              <h4 class="about-card__detail-title">${escapeHtml(link.title || link.label || "")}</h4>
              ${paragraphs}
              ${detailLinks}
            </div>
          `;
        }).join("");

        return `
          <article class="card about-card">
            <p class="about-card__eyebrow">${escapeHtml(item.eyebrow || "")}</p>
            <h3 class="about-card__title">${escapeHtml(item.title)}</h3>
            <p class="about-card__text">${escapeHtml(item.description)}</p>
            <div class="about-card__actions">
              <div class="about-card__nodes">${nodes}</div>
              ${details}
            </div>
          </article>
        `;
      }

      function renderPage(data) {
        document.getElementById("novels-container").innerHTML = renderNovels(data.novels);
        document.getElementById("gallery-container").innerHTML = renderGallery(data.gallery);
        document.getElementById("about-container").innerHTML = renderAbout(data.about);
        bindAboutDetails();
      }

      function bindAboutDetails() {
        const aboutContainer = document.getElementById("about-container");

        if (!aboutContainer) {
          return;
        }

        aboutContainer.querySelectorAll("[data-detail-trigger]").forEach((button) => {
          button.addEventListener("click", () => {
            const targetId = button.getAttribute("data-detail-trigger");
            const target = targetId ? aboutContainer.querySelector(`#${targetId}`) : null;

            if (!target) {
              return;
            }

            const isOpen = !target.hidden;

            aboutContainer.querySelectorAll(".about-card__detail").forEach((detail) => {
              detail.hidden = true;
              detail.classList.remove("is-visible");
            });

            aboutContainer.querySelectorAll("[data-detail-trigger]").forEach((node) => {
              node.setAttribute("aria-expanded", "false");
              node.classList.remove("is-active");
            });

            if (!isOpen) {
              target.hidden = false;
              target.classList.add("is-visible");
              button.setAttribute("aria-expanded", "true");
              button.classList.add("is-active");
            }
          });
        });
      }

      fetch("../data/home-content.json")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Failed to load home content.");
          }

          return response.json();
        })
        .then(renderPage)
        .catch(() => {
          renderPage(fallbackData);
        });
    </script>
  </body>
</html>
