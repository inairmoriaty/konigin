<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>KÖNIGIN Novels</title>
    <style>
      :root {
        --title: #ead9c0;
        --text: rgba(234, 217, 192, 0.88);
        --muted: rgba(234, 217, 192, 0.68);
        --line: rgba(234, 217, 192, 0.16);
        --line-strong: rgba(234, 217, 192, 0.26);
        --panel: rgba(25, 7, 10, 0.78);
        --panel-soft: rgba(43, 12, 17, 0.58);
        --button: rgba(87, 19, 28, 0.4);
        --shadow: rgba(0, 0, 0, 0.38);
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --content-max: 70rem;
        --stage-max: 96rem;
      }

      @font-face {
        font-family: "Cinzel";
        src: url("/fonts/Cinzel-VariableFont_wght.ttf") format("truetype");
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Tangerine";
        src: url("/fonts/Tangerine-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      html {
        margin: 0;
        padding: 0;
        background: #130305;
        overflow-x: hidden;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
        background:
          linear-gradient(180deg, rgba(8, 2, 3, 0.4), rgba(8, 2, 3, 0.85)),
          radial-gradient(circle at top, rgba(142, 38, 43, 0.3), transparent 34%),
          radial-gradient(circle at 50% 38%, rgba(111, 23, 33, 0.3), transparent 28%),
          url("../image/background/home.png") center top / min(100%, var(--stage-max)) auto no-repeat,
          linear-gradient(180deg, rgba(8, 2, 3, 0.8), rgba(8, 2, 3, 0.96)),
          #130305;
      }

      img {
        display: block;
        max-width: 100%;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .page::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .page::after {
        background:
          radial-gradient(circle at left top, rgba(0, 0, 0, 0.55), transparent 28%),
          radial-gradient(circle at right top, rgba(0, 0, 0, 0.48), transparent 26%),
          radial-gradient(circle at center, rgba(255, 205, 138, 0.05), transparent 42%);
        mix-blend-mode: screen;
      }

      .page__inner {
        position: relative;
        z-index: 1;
        width: min(100%, var(--content-max));
        margin: 0 auto;
        padding:
          calc(1.5rem + var(--safe-top))
          max(1rem, calc(1rem + var(--safe-right)))
          calc(4rem + var(--safe-bottom))
          max(1rem, calc(1rem + var(--safe-left)));
      }

      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0.75rem 0 2.75rem;
      }

      .hero__logo {
        width: clamp(9rem, 20vw, 13rem);
        margin-bottom: 1.5rem;
      }

      .hero__label {
        margin: 0;
        color: var(--muted);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 0.82rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }

      .hero__title {
        margin: 1.1rem 0 0;
        color: var(--title);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: clamp(3.6rem, 9vw, 5.8rem);
        font-weight: 500;
        line-height: 0.95;
      }

      .hero__intro {
        max-width: 44rem;
        margin: 1.25rem 0 0;
        color: var(--text);
        font-size: clamp(1.2rem, 2vw, 1.8rem);
        line-height: 1.65;
      }

      .divider {
        display: flex;
        justify-content: center;
        margin: 1.9rem 0 0;
      }

      .ornament-divider {
        display: block;
        width: min(20rem, 100%);
        height: auto;
        opacity: 0.8;
      }

      .section {
        padding-top: 1rem;
      }

      .section__head {
        text-align: center;
        margin-bottom: 1.5rem;
      }

      .section__title-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.55rem;
      }

      .section__title {
        margin: 0;
        color: var(--title);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 500;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-width: 10rem;
        padding: 0.85rem 1.5rem;
        border: 1px solid rgba(234, 217, 192, 0.18);
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(101, 22, 31, 0.38), rgba(37, 9, 13, 0.72)),
          var(--button);
        color: var(--title);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background-color 180ms ease;
      }

      .button:hover,
      .button:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(234, 217, 192, 0.3);
        outline: none;
      }

      .panel {
        position: relative;
        border: 1px solid rgba(234, 217, 192, 0.12);
        background:
          linear-gradient(180deg, rgba(69, 15, 23, 0.2), rgba(14, 4, 7, 0.72)),
          var(--panel);
        box-shadow: 0 1.2rem 3rem var(--shadow);
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0.7rem;
        border: 1px solid rgba(234, 217, 192, 0.08);
        pointer-events: none;
      }

      .featured-card {
        display: grid;
        grid-template-columns: minmax(13rem, 18rem) minmax(0, 1fr);
        gap: 2rem;
        padding: 2rem;
      }

      .featured-card__media {
        align-self: start;
      }

      .featured-card__cover,
      .archive-item__cover {
        width: 100%;
        border: 1px solid rgba(234, 217, 192, 0.12);
        box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.34);
        object-fit: cover;
      }

      .featured-card__cover {
        aspect-ratio: 3 / 4.25;
      }

      .featured-card__content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0.95rem;
        min-width: 0;
      }

      .featured-card__title,
      .archive-item__title {
        margin: 0;
        color: var(--title);
        font-family: "Cinzel", "Times New Roman", serif;
        font-weight: 500;
      }

      .featured-card__title {
        font-size: clamp(2.4rem, 5vw, 3.7rem);
      }

      .featured-card__pairing,
      .archive-item__pairing {
        margin: 0;
        font-size: clamp(1.1rem, 2vw, 1.55rem);
      }

      .featured-card__meta,
      .archive-item__meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem 0.7rem;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.5;
      }

      .featured-card__summary,
      .archive-item__summary,
      .empty-state {
        margin: 0;
        color: var(--text);
        line-height: 1.7;
      }

      .featured-card__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem 1rem;
        align-items: center;
        margin-top: 0.35rem;
      }

      .featured-card__summary,
      .featured-card__pairing,
      .featured-card__meta {
        min-width: 0;
      }

      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.65rem;
        margin-bottom: 1.5rem;
      }

      .filter-chip {
        appearance: none;
        border: 1px solid rgba(234, 217, 192, 0.16);
        border-radius: 999px;
        background: rgba(43, 11, 16, 0.36);
        color: var(--text);
        cursor: pointer;
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 0.9rem;
        padding: 0.6rem 1rem;
        transition:
          border-color 160ms ease,
          background-color 160ms ease,
          color 160ms ease;
      }

      .filter-chip.is-active,
      .filter-chip:hover,
      .filter-chip:focus-visible {
        border-color: rgba(234, 217, 192, 0.28);
        background: rgba(95, 22, 31, 0.34);
        color: var(--title);
        outline: none;
      }

      .archive-list {
        display: flex;
        flex-direction: column;
      }

      .archive-item {
        display: grid;
        grid-template-columns: 6.5rem minmax(0, 1fr);
        gap: 1.1rem;
        align-items: start;
        padding: 1.2rem 1.35rem;
        border-top: 1px solid rgba(234, 217, 192, 0.1);
      }

      .archive-item:first-child {
        border-top: 0;
      }

      .archive-item__thumb {
        width: 6.5rem;
        align-self: start;
      }

      .archive-item__cover {
        aspect-ratio: 1 / 1.18;
      }

      .archive-item__body {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.42rem;
        min-width: 0;
      }

      .archive-item__title {
        font-size: clamp(1.7rem, 3vw, 2.2rem);
      }

      .archive-item__pairing {
        margin-top: 0;
      }

      .archive-item__summary {
        margin-top: 0.15rem;
        max-width: 38rem;
      }

      .archive-item__action {
        margin-top: 0.35rem;
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .tag {
        padding: 0.24rem 0.6rem;
        border: 1px solid rgba(234, 217, 192, 0.12);
        border-radius: 999px;
        background: rgba(56, 14, 20, 0.3);
        color: var(--muted);
        font-family: "Cinzel", "Times New Roman", serif;
        font-size: 0.72rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .empty-state {
        padding: 2rem 1.5rem;
        text-align: center;
      }

      @media (max-width: 760px) {
        .featured-card {
          grid-template-columns: 6rem minmax(0, 1fr);
          gap: 0.8rem;
          padding: 0.9rem;
          align-items: start;
        }

        .featured-card__media {
          width: 6rem;
          max-width: none;
          margin: 0;
          align-self: start;
        }

        .featured-card__content {
          gap: 0.42rem;
          justify-content: start;
          align-self: start;
          padding-top: 0.05rem;
        }

        .featured-card__title {
          font-size: clamp(1.5rem, 6vw, 2rem);
          line-height: 0.96;
        }

        .featured-card__pairing {
          font-size: 0.95rem;
          line-height: 1.15;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .featured-card__meta {
          gap: 0.2rem 0.45rem;
          font-size: 0.78rem;
          line-height: 1.3;
        }

        .featured-card__summary {
          display: -webkit-box;
          -webkit-box-orient: vertical;
          -webkit-line-clamp: 3;
          overflow: hidden;
          font-size: 0.88rem;
          line-height: 1.38;
        }

        .featured-card .tag-list {
          display: none;
        }

        .featured-card__actions {
          flex-wrap: nowrap;
          gap: 0.55rem;
          align-items: center;
          margin-top: 0.15rem;
        }

        .featured-card .button {
          width: auto;
          min-width: 0;
          padding: 0.62rem 1rem;
          font-size: 0.8rem;
          white-space: nowrap;
          flex: 0 0 auto;
        }

        .archive-item {
          grid-template-columns: 6rem minmax(0, 1fr);
          gap: 0.8rem;
          padding: 0.9rem;
          align-items: start;
        }

        .archive-item__thumb {
          width: 6rem;
          align-self: start;
        }

        .archive-item__body {
          gap: 0.42rem;
          justify-content: start;
          align-self: start;
          padding-top: 0.05rem;
        }

        .archive-item__title {
          font-size: clamp(1.3rem, 5vw, 1.75rem);
          line-height: 0.98;
        }

        .archive-item__pairing {
          font-size: 0.95rem;
          line-height: 1.15;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .archive-item__meta {
          gap: 0.2rem 0.45rem;
          font-size: 0.78rem;
          line-height: 1.3;
        }

        .archive-item__summary {
          display: -webkit-box;
          -webkit-box-orient: vertical;
          -webkit-line-clamp: 3;
          overflow: hidden;
          font-size: 0.88rem;
          line-height: 1.38;
          max-width: none;
        }

        .archive-item__action {
          margin-top: 0.15rem;
        }

        .archive-item .button {
          width: auto;
          min-width: 0;
          padding: 0.62rem 1rem;
          font-size: 0.8rem;
          white-space: nowrap;
          flex: 0 0 auto;
        }
      }

      @media (max-width: 480px) {
        .page__inner {
          padding:
            calc(1rem + var(--safe-top))
            max(0.9rem, calc(0.9rem + var(--safe-right)))
            calc(2.8rem + var(--safe-bottom))
            max(0.9rem, calc(0.9rem + var(--safe-left)));
        }

        .hero {
          padding-bottom: 2rem;
        }

        .hero__intro {
          font-size: 1.05rem;
        }

        .featured-card {
          grid-template-columns: 6rem minmax(0, 1fr);
          gap: 0.72rem;
          padding: 0.82rem;
        }

        .featured-card__content {
          gap: 0.38rem;
        }

        .featured-card__title {
          font-size: 1.38rem;
        }

        .featured-card__pairing {
          font-size: 0.9rem;
        }

        .featured-card__meta {
          font-size: 0.73rem;
        }

        .featured-card__summary {
          -webkit-line-clamp: 2;
          font-size: 0.82rem;
          line-height: 1.32;
        }

        .featured-card .button {
          width: auto;
          padding: 0.56rem 0.9rem;
          font-size: 0.76rem;
        }

        .archive-item {
          grid-template-columns: 6rem minmax(0, 1fr);
          gap: 0.72rem;
          padding: 0.82rem;
        }

        .archive-item__thumb {
          width: 6rem;
        }

        .archive-item__title {
          font-size: 1.26rem;
        }

        .archive-item__pairing {
          font-size: 0.9rem;
        }

        .archive-item__meta {
          font-size: 0.73rem;
        }

        .archive-item__summary {
          -webkit-line-clamp: 2;
          font-size: 0.82rem;
          line-height: 1.32;
        }

        .button {
          width: 100%;
        }

        .featured-card .button {
          width: auto;
        }

        .archive-item .button {
          width: auto;
          padding: 0.56rem 0.9rem;
          font-size: 0.76rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="page__inner">
        <header class="hero">
          <img class="hero__logo" src="/image/element/logo-home.png" alt="KÖNIGIN" />
          <h1 class="hero__title">Novels</h1>
          <p class="hero__intro">
            A curated archive of dark romance, where longing, obsession, and tenderness take dangerous form.
          </p>
        </header>

        <section class="section" aria-labelledby="featured-title">
          <div class="section__head">
            <div class="section__title-wrap">
              <h2 class="section__title" id="featured-title">Featured Work</h2>
              <img class="ornament-divider" src="/image/element/divider.png" alt="" aria-hidden="true" />
            </div>
          </div>
          <div id="featured-container"></div>
        </section>

        <div class="divider" aria-hidden="true">
          <img class="ornament-divider" src="/image/element/divider.png" alt="" aria-hidden="true" />
        </div>

        <section class="section" aria-labelledby="archive-title">
          <div class="section__head">
            <div class="section__title-wrap">
              <h2 class="section__title" id="archive-title">Archive</h2>
              <img class="ornament-divider" src="/image/element/divider.png" alt="" aria-hidden="true" />
            </div>
          </div>
          <div class="filter-bar" id="filter-bar" aria-label="Filter novels"></div>
          <div id="archive-container"></div>
        </section>
      </div>
    </main>

    <script>
      const FILTERS = [
        { id: "All", label: "All" },
        { id: "Original", label: "Original" },
        { id: "Fanfiction", label: "Fanfiction" },
        { id: "Dark Romance", label: "Dark Romance" },
        { id: "Explicit", label: "Explicit" }
      ];

      const fallbackNovels = [];
      let novelsState = [];
      let activeFilter = "All";

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>'"]/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "'": "&#39;",
          '"': "&quot;"
        }[char]));
      }

      function normalizeText(value) {
        return String(value ?? "").trim().toLowerCase();
      }

      function getNovelMeta(novel) {
        const details = [novel.rating, novel.workType, novel.fandom, novel.status]
          .filter(Boolean)
          .map((item) => `<span>${escapeHtml(item)}</span>`);

        return details.length ? details.join("<span aria-hidden=\"true\">&bull;</span>") : "";
      }

      function renderTags(tags) {
        if (!Array.isArray(tags) || !tags.length) {
          return "";
        }

        return `
          <div class="tag-list" aria-label="Novel tags">
            ${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
          </div>
        `;
      }

      function renderNovelAction(novel) {
        return `
          <a class="button" href="${escapeHtml(novel.href || "#")}">
            ${escapeHtml(novel.buttonText || "Read Entry")}
          </a>
        `;
      }

      function renderFeaturedWork(novel) {
        if (!novel) {
          return `<div class="panel empty-state">No featured work is available yet.</div>`;
        }

        return `
          <article class="panel featured-card">
            <div class="featured-card__media">
              <img class="featured-card__cover" src="${escapeHtml(novel.cover)}" alt="${escapeHtml(novel.title)} cover" />
            </div>
            <div class="featured-card__content">
              <h3 class="featured-card__title">${escapeHtml(novel.title)}</h3>
              <p class="featured-card__pairing">${escapeHtml(novel.pairing)}</p>
              <div class="featured-card__meta">${getNovelMeta(novel)}</div>
              <p class="featured-card__summary">${escapeHtml(novel.summary)}</p>
              ${renderTags(novel.tags)}
              <div class="featured-card__actions">
                ${renderNovelAction(novel)}
              </div>
            </div>
          </article>
        `;
      }

      function renderArchiveItem(novel) {
        return `
          <article class="panel archive-item">
            <div class="archive-item__thumb">
              <img class="archive-item__cover" src="${escapeHtml(novel.cover)}" alt="${escapeHtml(novel.title)} cover" />
            </div>
            <div class="archive-item__body">
              <h3 class="archive-item__title">${escapeHtml(novel.title)}</h3>
              <p class="archive-item__pairing">${escapeHtml(novel.pairing)}</p>
              <div class="archive-item__meta">${getNovelMeta(novel)}</div>
              <p class="archive-item__summary">${escapeHtml(novel.summary)}</p>
              <div class="archive-item__action">
                ${renderNovelAction(novel)}
              </div>
            </div>
          </article>
        `;
      }

      function renderArchiveList(novels) {
        if (!novels.length) {
          return `<div class="panel empty-state">No novels match this filter.</div>`;
        }

        return `<div class="archive-list">${novels.map(renderArchiveItem).join("")}</div>`;
      }

      function matchesFilter(novel, filterId) {
        if (filterId === "All") {
          return true;
        }

        if (filterId === "Original" || filterId === "Fanfiction") {
          return normalizeText(novel.workType) === normalizeText(filterId);
        }

        return Array.isArray(novel.tags) && novel.tags.some((tag) => normalizeText(tag) === normalizeText(filterId));
      }

      function getFeaturedNovel(novels) {
        return novels.find((novel) => novel.featured) || novels[0] || null;
      }

      function renderFilterBar() {
        const container = document.getElementById("filter-bar");

        container.innerHTML = FILTERS.map((filter) => `
          <button
            class="filter-chip${filter.id === activeFilter ? " is-active" : ""}"
            type="button"
            data-filter="${escapeHtml(filter.id)}"
            aria-pressed="${String(filter.id === activeFilter)}"
          >
            ${escapeHtml(filter.label)}
          </button>
        `).join("");

        container.querySelectorAll("[data-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            activeFilter = button.getAttribute("data-filter") || "All";
            renderArchive();
            renderFilterBar();
          });
        });
      }

      function renderArchive() {
        const filtered = novelsState.filter((novel) => matchesFilter(novel, activeFilter));
        document.getElementById("archive-container").innerHTML = renderArchiveList(filtered);
      }

      function renderPage(novels) {
        novelsState = Array.isArray(novels) ? novels : fallbackNovels;
        document.getElementById("featured-container").innerHTML = renderFeaturedWork(getFeaturedNovel(novelsState));
        renderFilterBar();
        renderArchive();
      }

      fetch("../data/novels.json", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) {
            throw new Error("Failed to load novels.");
          }

          return response.json();
        })
        .then(renderPage)
        .catch(() => renderPage(fallbackNovels));
    </script>
  </body>
</html>
