<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">    
    <title>KONIGIN</title>
    <link rel="stylesheet" href="/css/styles.css?v=14" />
    </head>
  <body>
    <main class="landing" aria-label="KONIGIN landing page">
      <img
        class="landing__background"
        src="./image/background/index.png"
        alt=""
        aria-hidden="true"
      />

      <div class="landing__vignette" aria-hidden="true"></div>
      <div class="landing__glow landing__glow--main" aria-hidden="true"></div>
      <div class="landing__glow landing__glow--upper" aria-hidden="true"></div>
      <div class="landing__texture" aria-hidden="true"></div>

      <img
        class="landing__web"
        src="./image/element/web.png"
        alt=""
        aria-hidden="true"
      />

      <img
        class="landing__rose"
        src="./image/element/rose.png"
        alt=""
        aria-hidden="true"
      />

      <img
        src="./image/element/spider.png"
        class="entry-spider"
        id="entrySpider"
        alt=""
        aria-hidden="true"
      />

      <section class="hero">
        <p class="hero__subtitle">A Dominion of Feminine Storytelling</p>

        <a class="hero__logo-link" href="/page/home.html" aria-label="Enter KONIGIN">
          <span class="hero__logo-shell">
            <img
              class="hero__logo"
              src="./image/logo.png"
              alt="KONIGIN"
              onerror="this.parentElement.parentElement.dataset.missing='true';this.style.display='none';"
            />
          </span>
          <span class="hero__logo-frame" aria-hidden="true">
            <span class="hero__fallback">KONIGIN</span>
          </span>
        </a>

        <p class="hero__hint">
          <span></span>
          Click the sigil to enter
          <span></span>
        </p>
      </section>
    </main>
    <script src="./js/entry-transition.js?v=5"></script>
  </body>
</html>
